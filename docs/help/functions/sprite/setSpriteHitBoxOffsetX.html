<h3>setSpriteHitBoxOffsetX(spriteName, hitBoxOffsetX)</h3>

<h4>Description</h4>
<p id="description">
Sets the horizontal position of the hit box for <i>spriteName</i>, relative to <i>spriteName</i>'s
<a href="getspritex.html">horizontal position</a>, to <i>hitBoxOffsetX</i>.
</p>
