<h3>resolveSpriteCollision(spriteName1, spriteName2, contactTime)</h3>

<h4>Description</h4>
<p id="description">
Moves <i>spriteName1</i> and <i>spriteName2</i> to the positions they had at the point
when both sprites first made contact after the last call to <a href="updatesprites.html">updateSprites()</a>.
</p>
